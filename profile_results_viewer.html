<style>
:root{
  --bg:#faf7f2;--paper:#fff;--ink:#1a1410;--muted:#6b5f50;--lighter:#a09080;
  --border:#e8ddd0;--surface2:#f5f0e8;
  --green:#2a5c40;--green-bg:#eef6f1;
  --gold:#b8882a;--gold-bg:#fdf6e8;
  --navy:#1b2a4a;--navy-bg:#e8f0f8;
  --rose:#8a2040;--rose-bg:#fdf0f4;
  --red:#7a2020;--red-bg:#fdecea;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow2:0 4px 20px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.7;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* COVER */
.cover{padding:0;margin-bottom:0;}
.cover-inner{padding:2.5rem 1.5rem 2rem;text-align:center;}
.cover-badge{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35);display:block;margin-bottom:.65rem;}
.cover-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,5vw,2.5rem);font-weight:700;color:#f5edd8;line-height:1.2;margin-bottom:.2rem;}
.cover-type{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:.75rem;}
.cover-tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.ct{font-size:10px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);}

/* PROGRESS BAR */
.prog-bar{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:1px solid var(--border);padding:.5rem 1.25rem;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.prog-label{font-size:11px;color:var(--muted);font-weight:500;}
.print-btn{margin-left:auto;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:5px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;cursor:pointer;color:var(--muted);}
.print-btn:hover{background:var(--gold-bg);border-color:var(--gold);color:var(--gold);}

/* HERO RESULT */
.hero{border-radius:14px;padding:2rem 1.5rem;text-align:center;margin:1.25rem;box-shadow:var(--shadow2);}
.hero-rank{font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;opacity:.6;margin-bottom:.35rem;}
.hero-primary{font-family:'Cormorant Garamond',serif;font-size:clamp(1.75rem,6vw,3rem);font-weight:700;color:white;line-height:1.2;margin-bottom:.25rem;}
.hero-secondary{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:.5rem;}
.hero-date{font-size:10px;color:rgba(255,255,255,.3);}

/* SCORE BARS SECTION */
.section{max-width:720px;margin:0 auto;padding:0 1.25rem 1rem;}
.section-title{font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;color:var(--muted);margin:1.5rem 0 .75rem;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* SCORE BAR */
.score-card{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.65rem;box-shadow:var(--shadow);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.br-icon{font-size:1.1rem;flex-shrink:0;width:28px;text-align:center;}
.br-name{font-size:13px;font-weight:600;color:var(--ink);flex:1;}
.br-track{flex:2;height:20px;background:var(--border);border-radius:4px;overflow:hidden;}
.br-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;transition:width .8s ease;}
.br-fill span{font-size:10px;font-weight:700;color:white;}
.br-val{font-size:12px;font-weight:700;color:var(--muted);min-width:36px;text-align:right;}
.br-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0;}

/* PROFILE CARD (collapsible) */
.profile-card{background:var(--paper);border:1px solid var(--border);border-radius:12px;margin-bottom:.85rem;overflow:hidden;box-shadow:var(--shadow);}
.pc-head{display:flex;align-items:center;gap:14px;padding:1rem 1.1rem;cursor:pointer;transition:background .12s;user-select:none;}
.pc-head:hover{background:var(--surface2);}
.pc-icon{font-size:1.75rem;flex-shrink:0;}
.pc-info{flex:1;}
.pc-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--ink);}
.pc-tagline{font-size:11px;color:var(--lighter);}
.pc-rank{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;margin-left:6px;}
.pc-chev{font-size:11px;color:var(--lighter);transition:transform .2s;}
.profile-card.open .pc-chev{transform:rotate(180deg);}
.pc-body{display:none;padding:.85rem 1.1rem 1.1rem;border-top:1px solid var(--border);background:var(--surface2);}
.profile-card.open .pc-body{display:block;}

/* INFO BLOCKS */
.ib{border-radius:7px;padding:.65rem .85rem;margin:.4rem 0;font-size:12.5px;line-height:1.7;}
.ib-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:3px;}
.ib-green{background:var(--green-bg);border-left:3px solid var(--green);} .ib-green .ib-label{color:var(--green);}
.ib-gold{background:var(--gold-bg);border-left:3px solid var(--gold);} .ib-gold .ib-label{color:var(--gold);}
.ib-red{background:var(--red-bg);border-left:3px solid var(--red);} .ib-red .ib-label{color:var(--red);}
.ib-navy{background:var(--navy-bg);border-left:3px solid var(--navy);} .ib-navy .ib-label{color:var(--navy);}
.ib-rose{background:var(--rose-bg);border-left:3px solid var(--rose);} .ib-rose .ib-label{color:var(--rose);}

.desc-en{font-size:13px;color:var(--ink);line-height:1.75;margin-bottom:.5rem;}
.desc-tl{font-size:13px;color:var(--muted);line-height:1.75;font-style:italic;border-left:3px solid var(--gold);padding-left:.75rem;margin-bottom:.85rem;}

/* DOMAIN GRID */
.domain-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:.5rem 0;}
.dg-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:.65rem .85rem;text-align:center;}
.dg-num{font-size:1.4rem;font-weight:700;}
.dg-label{font-size:10px;color:var(--lighter);}

/* ERROR */
.error-box{max-width:480px;margin:3rem auto;padding:1.5rem;background:var(--red-bg);border:1px solid rgba(122,32,32,.2);border-radius:10px;text-align:center;}

@media print{
  .prog-bar,.print-btn{display:none!important;}
  .profile-card.open .pc-body,.pc-body{display:block!important;}
  .cover{margin-bottom:1rem;}
}
@media(max-width:480px){
  .bar-row{flex-wrap:wrap;}
  .br-track{flex:1 0 100%;}
}
</style>
</head>

function ib(cls, label, text) {
  return `<div class="ib ib-${cls}"><div class="ib-label">${label}</div>${text}</div>`;
}

function renderLL(d, member) {
  const scores = d.results || {};
  const sorted = LL_DATA.slice().sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0));
  const total = Object.values(scores).reduce((a,b)=>a+b,0)||1;

  // Cover
  document.getElementById('coverWrap').style.background = 'linear-gradient(135deg,#2a0a1a,#4a1030,#1b2a4a)';
  document.getElementById('coverName').textContent = (member?.name||d.member_name||'Member') + "'s Love Language Profile";
  document.getElementById('coverType').textContent = 'Love Language Assessment';
  document.getElementById('coverTags').innerHTML = '<span class="ct">❤️ Primary: '+sorted[0].name+'</span><span class="ct">Secondary: '+sorted[1].name+'</span>';
  document.getElementById('progLabel').textContent = 'Love Language Profile · Taken: '+(d.date_taken||'—');

  // Hero
  document.getElementById('heroWrap').innerHTML = `<div class="section"><div class="hero" style="background:linear-gradient(135deg,#2a0a1a,#4a1030)">
    <div class="hero-rank">Primary Love Language</div>
    <div class="hero-primary">${sorted[0].icon} ${sorted[0].name}</div>
    <div class="hero-secondary">Secondary: ${sorted[1].icon} ${sorted[1].name}</div>
    <div class="hero-date">Taken: ${d.date_taken||'—'} · ${member?.name||d.member_name||''}</div>
  </div></div>`;

  // Score bars
  const sw = document.getElementById('scoresWrap');
  sw.innerHTML = '<div class="section-title">All 5 Love Languages — Score Breakdown</div>';
  sorted.forEach((l,i) => {
    const s = scores[l.id]||0;
    const pct = Math.round(s/total*100);
    const colors = ['#8a2040','#7a4010','#1a4a6b','#7a6010','#2a5c40'];
    sw.innerHTML += `<div class="bar-row">
      <span class="br-icon">${l.icon}</span>
      <span class="br-name">${l.name}${i===0?' <span class="br-badge" style="background:#fdf0f4;color:#8a2040">Primary</span>':i===1?' <span class="br-badge" style="background:#fdf6e8;color:#b8882a">Secondary</span>':''}</span>
      <div class="br-track"><div class="br-fill" style="width:${Math.max(pct,3)}%;background:${colors[i%5]}"><span>${s}</span></div></div>
      <span class="br-val">${s} pts</span>
    </div>`;
  });

  // Profile cards
  const cw = document.getElementById('cardsWrap');
  cw.innerHTML = '<div class="section-title">Love Language Profiles — Full Detail</div>';
  sorted.forEach((l,i) => {
    const isOpen = i < 2;
    const rankLabel = i===0?'Primary':i===1?'Secondary':'';
    const rankStyle = i===0?'background:#fdf0f4;color:#8a2040':i===1?'background:#fdf6e8;color:#b8882a':'';
    cw.innerHTML += `<div class="profile-card ${isOpen?'open':''}">
      <div class="pc-head" onclick="this.closest('.profile-card').classList.toggle('open')">
        <div class="pc-icon">${l.icon}</div>
        <div class="pc-info">
          <div class="pc-name">${l.name}${rankLabel?` <span class="pc-rank" style="${rankStyle}">${rankLabel}</span>`:''}</div>
          <div class="pc-tagline">${l.tagline}</div>
        </div>
        <span class="pc-chev">▼</span>
      </div>
      <div class="pc-body">
        <div class="desc-en">${l.descEn}</div>
        <div class="desc-tl">${l.descTl}</div>
        ${ib('green','⛪ Best Ministry Fit',l.ministry)}
        ${ib('gold','👥 In a Team / Sa Koponan',l.team)}
        ${ib('navy','🤝 Discipling This Person',l.discipler)}
        ${ib('red','⚠ Growth Edge / Blindspot',l.blindspot)}
      </div>
    </div>`;
  });
}

  document.getElementById('progLabel').textContent = 'Strengths Profile · Taken: '+(d.date_taken||'—');

  document.getElementById('heroWrap').innerHTML = `<div class="section"><div class="hero" style="background:linear-gradient(135deg,#1a0a0a,#2a1a0a,#0a1a2a)">
    <div class="hero-rank">Top 5 Strengths</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:.65rem 0">
      ${top5.map(([id],i)=>{
        const dom = STRENGTHS_DOMAINS[id]||'Unknown';
        const c = domColors[dom]||'#888';
        const name = id.charAt(0).toUpperCase()+id.slice(1).replace(/-/g,' ');
        return `<div style="background:rgba(255,255,255,.08);border-radius:8px;padding:.5rem .3rem;text-align:center">
          <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.4)">#${i+1}</div>
          <div style="font-size:11px;font-weight:700;color:white;line-height:1.2;margin:.2rem 0">${name}</div>
          <div style="font-size:9px;color:${c};font-weight:600">${dom.replace('Relationship Building','Rel. Bldg')}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="hero-date">Taken: ${d.date_taken||'—'}</div>
  </div></div>`;

  const sw = document.getElementById('scoresWrap');
  sw.innerHTML = '<div class="section-title">Domain Breakdown</div><div class="domain-grid">';
  ['Executing','Influencing','Relationship Building','Strategic Thinking'].forEach(dom=>{
    const c = domColors[dom]||'#888';
    const cnt = domCount[dom]||0;
    sw.innerHTML += `<div class="dg-card"><div class="dg-num" style="color:${c}">${cnt}</div><div class="dg-label">${dom}</div><div style="font-size:10px;color:var(--lighter)">of top 5</div></div>`;
  });
  sw.innerHTML += '</div>';

  if(sorted.length > 5) {
    sw.innerHTML += '<div class="section-title" style="margin-top:1.25rem">All Themes — Score Breakdown</div>';
    sorted.slice(0,15).forEach(([id,s],i)=>{
      const dom = STRENGTHS_DOMAINS[id]||'Unknown';
      const c = domColors[dom]||'#888';
      const name = id.charAt(0).toUpperCase()+id.slice(1).replace(/-/g,' ');
      const maxScore = sorted[0][1]||1;
      const pct = Math.round(s/maxScore*100);
      sw.innerHTML += `<div class="bar-row">
        <span class="br-icon" style="font-size:11px;font-weight:700;color:var(--lighter)">#${i+1}</span>
        <span class="br-name">${name}${i<5?` <span class="br-badge" style="background:${c}22;color:${c}">Top 5</span>`:''}</span>
        <div class="br-track"><div class="br-fill" style="width:${Math.max(pct,2)}%;background:${c}"><span>${s}</span></div></div>
        <span class="br-val" style="font-size:10px;color:var(--lighter)">${dom.split(' ')[0]}</span>
      </div>`;
    });
  }

  const cw = document.getElementById('cardsWrap');
  cw.innerHTML = '<div class="section-title">Top 5 Themes — Full Detail</div>';
  top5.forEach(([id],i)=>{
    const info = STRENGTHS_DESC[id]||{desc:'',ministry:''};
    const dom = STRENGTHS_DOMAINS[id]||'Unknown';
    const c = domColors[dom]||'#888';
    const name = id.charAt(0).toUpperCase()+id.slice(1).replace(/-/g,' ');
    cw.innerHTML += `<div class="profile-card ${i<2?'open':''}">
      <div class="pc-head" onclick="this.closest('.profile-card').classList.toggle('open')">
        <div class="pc-icon" style="width:44px;height:44px;border-radius:50%;background:${c};color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;text-align:center;line-height:1.1">#${i+1}</div>
        <div class="pc-info">
          <div class="pc-name">${name} <span class="pc-rank" style="background:${c}22;color:${c}">${dom}</span></div>
          <div class="pc-tagline">Theme ${i+1} of ${top5.length}</div>
        </div>
        <span class="pc-chev">▼</span>
      </div>
      <div class="pc-body">
        <div class="desc-en">${info.desc||'—'}</div>
        ${ib('green','⛪ Ministry Fit',info.ministry||'—')}
        ${ib('navy','💡 Discipleship Application','Lead with your '+name+' strength. In a team, you need someone who complements this with '+(dom==='Executing'?'Influencing or Relationship Building':dom==='Influencing'?'Executing or Strategic Thinking':dom==='Relationship Building'?'Executing or Strategic Thinking':'Executing or Relationship Building')+'.')}
      </div>
    </div>`;
  });
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOAD
// ═══════════════════════════════════════════════════════════════

function setLoadingMsg(msg) {
  const el = document.querySelector('.loading div:last-child');
  if(el) el.textContent = msg;
}

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_,reject) => setTimeout(()=>reject(new Error(label+' timed out after '+ms/1000+'s. Check your connection.')), ms))
  ]);
}

async function loadResults() {
  const params = new URLSearchParams(window.location.search);
  const memberId = params.get('id');
  const type = params.get('type');

  if(!memberId || !type) {
    showError('Missing Parameters', 'This page requires ?id= and ?type= in the URL. Open this page from the MULTIPLY Dashboard Profile tab.');
    return;
  }

  try {
    setLoadingMsg('Connecting to database...');
    const db = getDB();
    if(!db) { showError('Connection Failed', 'Could not initialize Supabase. Check your internet connection.'); return; }

    // Fetch profile results first (most important)
    setLoadingMsg('Loading profile results...');
    const profilePromise = db.from('member_profiles')
      .select('*')
      .eq('member_id', memberId)
      .eq('profile_type', type)
      .order('date_taken', {ascending:false})
      .limit(1);

    const {data:rows, error} = await withTimeout(profilePromise, 10000, 'Profile fetch');

    if(error) {
      showError('Database Error', 'Could not load results: ' + error.message + ' (code: ' + (error.code||'unknown') + ')');
      return;
    }
    if(!rows || rows.length === 0) {
      showError('No Results Found', 'No saved ' + type.replace(/_/g,' ') + ' results found for this member. Please complete the assessment first.');
      return;
    }

    // Fetch member name (best effort — don't fail if this times out)
    setLoadingMsg('Loading member info...');
    let member = null;
    try {
      const memberPromise = db.from('members').select('id,name,pipeline_level,discipler_name').eq('id', memberId).limit(1);
      const {data:mRows} = await withTimeout(memberPromise, 5000, 'Member fetch');
      member = mRows && mRows.length > 0 ? mRows[0] : null;
    } catch(e) {
      console.warn('Member fetch failed (non-critical):', e.message);
    }

    setLoadingMsg('Rendering results...');
    const d = rows[0];

    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('mainView').style.display = 'block';

    if(type==='love_language') renderLL(d, member);
    else if(type==='disc') renderDISC(d, member);
    else if(type==='enneagram') renderEnneagram(d, member);
    else if(type==='strengths') renderStrengths(d, member);
    else showError('Unknown Type', 'Profile type "'+type+'" is not supported. Supported types: love_language, disc, enneagram, strengths.');

  } catch(e) {
    showError('Error Loading Results', e.message + '\n\nCheck your internet connection and try reloading the page.');
  }
}

function showError(title, msg) {
  document.getElementById('loadingView').style.display='none';
  document.getElementById('errorView').style.display='block';
  document.getElementById('errorTitle').textContent=title;
  document.getElementById('errorMsg').textContent=msg;
}

document.addEventListener('DOMContentLoaded', loadResults);
</script>
